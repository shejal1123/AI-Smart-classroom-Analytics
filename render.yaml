services:
  - type: web
    name: smart-classroom
    env: python
    plan: free
    buildCommand: |
      pip install -r requirements.txt
      python db_setup.py
    startCommand: |
      gunicorn --bind 0.0.0.0:$PORT app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.9.16
      - key: PORT
        value: 10000
    disk:
      name: smart-classroom-disk
      mountPath: /opt/render/project/src/instance
      sizeGB: 1 