{% extends "base.html" %}

{% block title %}Teacher Login{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6 col-lg-4">
        <div class="card">
            <div class="card-header bg-primary text-white text-center">
                <h4 class="mb-0"><i class="fas fa-sign-in-alt me-2"></i>Teacher Login</h4>
            </div>
            <div class="card-body">
                {% if error %}
                <div class="alert alert-danger" role="alert">
                    <i class="fas fa-exclamation-triangle me-2"></i>{{ error }}
                </div>
                {% endif %}
                
                <form method="post">
                    <div class="form-group mb-3">
                        <label for="teacher_id" class="form-label">Teacher ID:</label>
                        <input type="text" class="form-control" id="teacher_id" name="teacher_id" required>
                    </div>
                    
                    <div class="form-group mb-3">
                        <label for="password" class="form-label">Password:</label>
                        <input type="password" class="form-control" id="password" name="password" required>
                    </div>
                    
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-sign-in-alt me-1"></i>Login
                        </button>
                    </div>
                </form>
                
                <hr>
                <div class="text-center">
                    <p class="mb-2">Don't have an account?</p>
                    <a href="{{ url_for('register') }}" class="btn btn-outline-secondary">
                        <i class="fas fa-user-plus me-1"></i>Register
                    </a>
                </div>
                
                <hr>
                <div class="text-center">
                    <p class="mb-2"><strong>Need to start quickly without account?</strong></p>
                    <a href="{{ url_for('quickstart') }}" class="btn btn-info btn-lg">
                        <i class="fas fa-rocket me-1"></i>Quick Start
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
