{% extends "base.html" %}

{% block title %}Teacher Registration{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6 col-lg-5">
        <div class="card">
            <div class="card-header bg-success text-white text-center">
                <h4 class="mb-0"><i class="fas fa-user-plus me-2"></i>Teacher Registration</h4>
            </div>
            <div class="card-body">
                {% if error %}
                <div class="alert alert-danger" role="alert">
                    <i class="fas fa-exclamation-triangle me-2"></i>{{ error }}
                </div>
                {% endif %}
                
                <form method="post">
                    <div class="form-group mb-3">
                        <label for="teacher_id" class="form-label">Teacher ID:</label>
                        <input type="text" class="form-control" id="teacher_id" name="teacher_id" placeholder="Enter unique teacher ID" required>
                    </div>
                    
                    <div class="form-group mb-3">
                        <label for="name" class="form-label">Full Name:</label>
                        <input type="text" class="form-control" id="name" name="name" placeholder="Enter your full name" required>
                    </div>
                    

                    
                    <div class="form-group mb-3">
                        <label for="password" class="form-label">Password:</label>
                        <input type="password" class="form-control" id="password" name="password" placeholder="Enter a secure password" required>
                    </div>
                    
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-success">
                            <i class="fas fa-user-plus me-1"></i>Register
                        </button>
                    </div>
                </form>
                
                <hr>
                <div class="text-center">
                    <p class="mb-2">Already have an account?</p>
                    <a href="{{ url_for('login') }}" class="btn btn-outline-primary">
                        <i class="fas fa-sign-in-alt me-1"></i>Login
                    </a>
                </div>
                
                <hr>
                <div class="text-center">
                    <p class="mb-2">Need to start quickly?</p>
                    <a href="{{ url_for('quickstart') }}" class="btn btn-outline-info">
                        <i class="fas fa-rocket me-1"></i>Quick Start
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
